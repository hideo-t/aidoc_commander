<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>司令塔 — AIの町医者</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f0f;--bg2:#181818;--bg3:#222;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.16);--text:#e8e6e0;--text2:#888;--text3:#555;--green:#1D9E75;--amber:#BA7517;--blue:#378ADD;--red:#E24B4A;--purple:#7F77DD;--accent:#c8502a;--sans:'Noto Sans JP',sans-serif;--mono:'DM Mono',monospace;--r:8px;--rl:12px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300;line-height:1.5}
.layout{display:grid;grid-template-columns:192px 1fr;min-height:100vh}
/* SIDEBAR */
.side{background:var(--bg2);border-right:1px solid var(--border);padding:1rem .75rem;display:flex;flex-direction:column;gap:2px;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{font-family:var(--mono);font-size:.7rem;letter-spacing:.1em;color:var(--accent);padding:0 .4rem .75rem;border-bottom:1px solid var(--border);margin-bottom:.5rem}
.logo small{color:var(--text3);font-size:.58rem;display:block;margin-top:2px}
.nav{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:var(--r);font-size:.75rem;color:var(--text2);cursor:pointer;border:none;background:transparent;width:100%;text-align:left;transition:all .15s}
.nav:hover{background:var(--bg3);color:var(--text)}
.nav.on{background:var(--bg3);color:var(--text);border-left:2px solid var(--accent)}
.navsec{font-size:.58rem;letter-spacing:.1em;color:var(--text3);padding:.6rem .4rem .2rem;font-family:var(--mono)}
.side-bottom{margin-top:auto;padding-top:.75rem;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:2px}
/* GAS STATUS */
.gas-row{display:flex;align-items:center;gap:5px;padding:5px 9px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0}
.dot.ok{background:var(--green)}.dot.err{background:var(--red)}.dot.busy{background:var(--amber);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.gas-lbl{font-size:.65rem;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* MAIN */
.main{padding:1.25rem;overflow-x:hidden;min-width:0}
.sec{display:none}.sec.on{display:block}
/* HEADER */
.phdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.ptitle{font-size:1rem;font-weight:500;color:var(--text)}
.psub{font-size:.68rem;color:var(--text2);font-family:var(--mono);margin-top:2px}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:10px 12px}
.sv{font-size:1.25rem;font-weight:500}.sl{font-size:.65rem;color:var(--text2);margin-top:1px}.ss{font-size:.6rem;color:var(--text3);margin-top:1px}
/* GOAL BAR */
.gbar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:11px 13px;margin-bottom:1rem}
.gtop{display:flex;justify-content:space-between;font-size:.68rem;color:var(--text2);margin-bottom:5px}
.barbg{height:7px;background:var(--bg3);border-radius:99px;overflow:hidden}
.barfill{height:100%;background:var(--green);border-radius:99px;transition:width .5s}
.gnote{font-size:.6rem;color:var(--text3);margin-top:4px;text-align:right;font-family:var(--mono)}
/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:12px 14px;margin-bottom:8px}
.ctitle{font-size:.78rem;font-weight:500;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:6px}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:.72rem}
.tbl th{text-align:left;font-size:.6rem;color:var(--text3);padding:4px 7px;border-bottom:1px solid var(--border);font-family:var(--mono);letter-spacing:.04em}
.tbl td{padding:4px 7px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.02)}
.tbl input,.tbl select{background:transparent;border:none;outline:none;font-size:.72rem;color:var(--text);width:100%;font-family:var(--sans)}
.tbl input[type=number]{text-align:right}
.tbl select{color:var(--text2);cursor:pointer}.tbl select option{background:var(--bg2)}
/* KANBAN */
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:1rem}
.kcol{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:8px;min-height:50px}
.khead{font-size:.62rem;font-weight:500;color:var(--text3);margin-bottom:6px;display:flex;justify-content:space-between;font-family:var(--mono)}
.kcard{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:6px 8px;margin-bottom:4px;cursor:pointer;transition:border-color .15s}
.kcard:hover{border-color:var(--border2)}
.kname{font-size:.72rem;font-weight:500;color:var(--text)}
.kdate{font-size:.6rem;color:var(--text3);font-family:var(--mono);margin-top:1px}
.kmeta{display:flex;justify-content:space-between;align-items:center;margin-top:3px}
/* PROJECTS */
.plist{display:flex;flex-direction:column;gap:4px}
.prow{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;transition:border-color .15s}
.prow:hover{border-color:var(--border2)}.prow.open{border-color:rgba(200,80,42,.4)}
.ptop{display:flex;align-items:center;gap:6px;padding:7px 10px;cursor:pointer}
.pname{font-size:.75rem;font-weight:500;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pmrr{font-size:.72rem;font-weight:500;color:var(--green);min-width:44px;text-align:right}
.pbar-bg{height:2px;background:var(--bg3)}.pbar{height:100%}
.pdetail{display:none;padding:9px 10px;border-top:1px solid var(--border);background:var(--bg3)}
.prow.exp .pdetail{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.dlbl{font-size:.6rem;color:var(--text3);margin-bottom:2px;font-family:var(--mono)}
.pdetail input,.pdetail select,.pdetail textarea{width:100%;font-size:.72rem;padding:4px 7px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg2);color:var(--text);outline:none;font-family:var(--sans)}
.pdetail textarea{min-height:36px;resize:none}.pdetail select option{background:var(--bg2)}
/* FILTER BAR */
.fbar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.5rem;align-items:center}
.fbar input{flex:1;min-width:100px;font-size:.72rem;padding:4px 8px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg3);color:var(--text);outline:none}
.chip{font-size:.65rem;padding:3px 9px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s}
.chip:hover{border-color:var(--border2);color:var(--text)}.chip.on{background:var(--text);color:var(--bg);border-color:var(--text)}
/* TAGS */
.tag{font-size:.6rem;padding:2px 5px;border-radius:99px;font-weight:500;white-space:nowrap}
.tg-u{background:rgba(55,138,221,.15);color:#7bc0ff}
.tg-gh{background:rgba(29,158,117,.15);color:#5dcca5}
.tg-lo{background:rgba(186,117,23,.15);color:#e8a840}
.tg-sub{background:rgba(29,158,117,.2);color:#5dcca5}
.tg-once{background:rgba(200,80,42,.15);color:#e8845a}
.tg-free{background:rgba(255,255,255,.06);color:var(--text3)}
.tg-act{background:rgba(29,158,117,.2);color:#5dcca5}
.tg-wip{background:rgba(186,117,23,.2);color:#e8a840}
.tg-idea{background:rgba(127,119,221,.2);color:#b5b0f0}
.tg-arch{background:rgba(255,255,255,.06);color:var(--text3)}
.tg-gem{background:rgba(186,117,23,.2);color:#e8a840}
.tg-lang{background:rgba(255,255,255,.06);color:var(--text2)}
.tg-hi{background:rgba(226,75,74,.15);color:#f08080}
.tg-mid{background:rgba(186,117,23,.15);color:#e8a840}
.tg-lo2{background:rgba(255,255,255,.06);color:var(--text3)}
.tg-added{background:rgba(29,158,117,.2);color:#5dcca5}
/* BTNS */
.btn{font-size:.68rem;padding:5px 12px;border-radius:var(--r);border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--sans)}
.btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-p{background:var(--accent);border-color:var(--accent);color:#fff}.btn-p:hover{opacity:.85}
.btn-g{background:var(--green);border-color:var(--green);color:#fff}.btn-g:hover{opacity:.85}
.btn-d{color:var(--red)}.btn-d:hover{background:rgba(226,75,74,.1);border-color:var(--red)}
.btn-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
/* INPUT ROW */
.irow{display:flex;gap:8px;margin-bottom:.75rem;align-items:flex-end;flex-wrap:wrap}
.fld{display:flex;flex-direction:column;gap:3px;flex:1;min-width:120px}
.flbl{font-size:.62rem;color:var(--text3)}
.irow input[type=text],.irow input[type=password]{width:100%;font-size:.75rem;padding:5px 9px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg3);color:var(--text);outline:none;transition:border-color .15s}
.irow input:focus{border-color:var(--border2)}
/* ADD FORM */
.addform{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rl);padding:10px;margin-bottom:8px}
.addgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.addform input,.addform select{width:100%;font-size:.72rem;padding:4px 7px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg2);color:var(--text);outline:none;font-family:var(--sans)}
.addform select option{background:var(--bg2)}
/* MRR */
.mrow{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.mlbl{font-size:.65rem;color:var(--text2);min-width:36px;font-family:var(--mono)}
.mbg{flex:1;height:14px;background:var(--bg3);border-radius:3px;overflow:hidden}
.mbar{height:100%;border-radius:3px;transition:width .5s}
.minput{font-size:.65rem;background:transparent;border:none;outline:none;color:var(--text);width:42px;text-align:right;font-family:var(--mono)}
/* REVENUE */
.revgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:1rem}
.revcrd{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:12px}
.revval{font-size:1.25rem;font-weight:500;color:var(--green);margin:3px 0 7px}
.revitem{display:flex;justify-content:space-between;font-size:.65rem;padding:3px 0;border-bottom:1px solid var(--border);color:var(--text2)}
.revitem:last-child{border-bottom:none}
/* IDEAS */
.idearow{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:7px 9px;display:flex;align-items:center;gap:7px;margin-bottom:4px}
.ideatxt input{background:transparent;border:none;outline:none;font-size:.75rem;color:var(--text);flex:1;width:100%}
.idearow select{background:transparent;border:none;outline:none;font-size:.65rem;color:var(--text2);cursor:pointer}
.idearow select option{background:var(--bg2)}
/* NOTE */
.notearea{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rl);padding:11px 13px}
.notearea textarea{width:100%;background:transparent;border:none;outline:none;font-size:.75rem;color:var(--text);line-height:1.8;resize:none;min-height:100px;font-family:var(--sans)}
/* PROGRESS */
.progwrap{margin-bottom:.75rem;display:none}
.progtxt{font-size:.65rem;color:var(--text2);margin-bottom:3px;font-family:var(--mono)}
.progbg{height:4px;background:var(--bg3);border-radius:99px;overflow:hidden}
.progfill{height:100%;background:var(--blue);border-radius:99px;transition:width .3s}
/* REPO CARDS */
.rlist{display:flex;flex-direction:column;gap:4px}
.rcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;transition:border-color .15s}
.rcard:hover{border-color:var(--border2)}.rcard.gem{border-color:rgba(186,117,23,.5)}.rcard.rsel{border-color:rgba(55,138,221,.6);background:rgba(55,138,221,.04)}
.rtop{display:flex;align-items:center;gap:6px;padding:7px 10px;cursor:pointer;user-select:none}
.rchk{width:14px;height:14px;border-radius:3px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;cursor:pointer}
.rcard.rsel .rchk{background:var(--blue);border-color:var(--blue);color:#fff}
.rname{font-size:.75rem;font-weight:500;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rmeta{font-size:.6rem;color:var(--text3);font-family:var(--mono);white-space:nowrap}
.rpbar-bg{height:2px;background:var(--bg3)}.rpbar{height:100%}
.rdesc{padding:0 10px 5px;font-size:.68rem;color:var(--text2);line-height:1.5}
.rdetail{display:none;padding:9px 10px;border-top:1px solid var(--border);background:var(--bg3)}
.rcard.exp .rdetail{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.rdetail input,.rdetail select,.rdetail textarea{width:100%;font-size:.7rem;padding:4px 7px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg2);color:var(--text);outline:none;font-family:var(--sans)}
.rdetail textarea{min-height:36px;resize:none}.rdetail select option{background:var(--bg2)}
/* SELECT BAR */
.selbar{display:none;gap:6px;align-items:center;padding:7px 11px;background:rgba(55,138,221,.1);border:1px solid rgba(55,138,221,.3);border-radius:var(--r);margin-bottom:.5rem;flex-wrap:wrap}
.selbar.show{display:flex}
.selcnt{font-size:.75rem;font-weight:500;color:var(--blue)}
.selbar select{font-size:.68rem;padding:4px 7px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg3);color:var(--text);outline:none}
.selbar select option{background:var(--bg2)}
/* GROUPS */
.grpwrap{margin-bottom:.5rem}
.grphead{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;margin-bottom:3px;transition:border-color .15s}
.grphead:hover{border-color:var(--border2)}
.grpname{font-size:.75rem;font-weight:500;color:var(--text)}
.grpmeta{display:flex;gap:5px;align-items:center}
.grpbody{padding:0 3px}
.addgrp{display:flex;gap:6px;margin-bottom:.75rem;align-items:center}
.addgrp input{font-size:.75rem;padding:5px 9px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg3);color:var(--text);outline:none;flex:1}
/* STXT */
.stxt{font-size:.65rem;color:var(--text3);font-family:var(--mono);margin-bottom:.4rem}
.err{background:rgba(226,75,74,.1);border:1px solid rgba(226,75,74,.3);border-radius:var(--r);padding:7px 10px;font-size:.68rem;color:#f08080;margin-bottom:.6rem}
.note{font-size:.65rem;color:var(--text3);line-height:1.6;margin-top:4px}

@media(max-width:700px){.layout{grid-template-columns:1fr}.side{position:static;height:auto;flex-direction:row;flex-wrap:wrap;padding:.5rem}.logo,.navsec,.side-bottom{display:none}.main{padding:.75rem}.stats{grid-template-columns:repeat(2,1fr)}.kanban{grid-template-columns:repeat(3,1fr)}.prow.exp .pdetail,.rcard.exp .rdetail,.addgrid{grid-template-columns:1fr}.revgrid{grid-template-columns:1fr}}
</style>
</head>
<body>



<div class="layout">

  <aside class="side">
    <div class="logo">AIの町医者<small>司令塔 v3.0</small></div>

  <main class="main" id="main"></main>
</div>

// GETは常に動く。POSTやpayload付きGETは大きいデータでURL長制限に引っかかる。

// 小さいデータ専用（リポジトリ操作など）
function gasSmallWrite(b){

}

// GitHub
function scoreR(r){
  const days=(Date.now()-new Date(r.pushed_at))/86400000;
  let sc=0,isGem=false,reason='';
  if(r.stargazers_count>0)sc+=r.stargazers_count*5;
  if(r.forks_count>0)sc+=r.forks_count*3;
  if(days>30&&days<365)sc+=20;if(days<30)sc+=10;
  if(r.description)sc+=15;if(r.homepage)sc+=20;
  if(r.topics?.length)sc+=r.topics.length*5;
  const n=(r.name+' '+(r.description||'')).toLowerCase();
  const biz=['ai','bot','chat','api','app','tool','system','dashboard','line','webhook','自動','診断','予約','管理'];
  const hits=biz.filter(k=>n.includes(k));if(hits.length)sc+=hits.length*8;
  const rev=['stripe','payment','subscription','saas'];
  if(rev.some(k=>n.includes(k))){sc+=30;isGem=true;reason='収益化シグナル';}
  const tmpl=['template','boilerplate','starter','generator'];
  if(tmpl.some(k=>n.includes(k))){sc+=25;isGem=true;reason=reason||'横展開可能';}
  if(r.size>100)sc+=10;if(r.size>1000)sc+=15;if(r.fork)sc-=20;
  if(!r.fork&&days>180&&days<730&&r.size>50){isGem=true;reason=reason||'実装済み長期放置';}
  return{...r,score:Math.max(0,sc),isGem,gemReason:reason,daysSincePush:Math.round(days),group:'未分類',priority:'mid',status:'idea',memo:''};
}
async function doFetch(){
  const user=document.getElementById('ghu').value.trim();
  const token=document.getElementById('ght').value.trim();
  if(!user)return;
  document.getElementById('fbtn').disabled=true;
  document.getElementById('fprog').style.display='block';
  document.getElementById('ferr').innerHTML='';
  fetched=[];sel.clear();
  const hd={Accept:'application/vnd.github.v3+json'};
  if(token)hd.Authorization='Bearer '+token;
  try{
    let page=1;
    while(true){
      document.getElementById('ptxt').textContent=`取得中... ${fetched.length}件`;
      document.getElementById('pfill').style.width=Math.min(55,fetched.length/3)+'%';
      const r=await fetch(`https://api.github.com/users/${user}/repos?per_page=100&sort=pushed&page=${page}`,{headers:hd});
      if(!r.ok)throw new Error(`GitHub API ${r.status}: ${r.statusText}`);
      const d=await r.json();if(!d.length)break;
      fetched=fetched.concat(d.map(scoreR));if(d.length<100)break;page++;
    }
    fetched.sort((a,b)=>b.score-a.score);
    document.getElementById('ptxt').textContent='分析完了！';
    document.getElementById('pfill').style.width='100%';
    await delay(300);
    document.getElementById('fprog').style.display='none';
  }catch(e){
    document.getElementById('ferr').innerHTML=`<div class="err">${e.message}</div>`;
    document.getElementById('fprog').style.display='none';
  }
  document.getElementById('fbtn').disabled=false;
  render();
}
async function pushSheet(repos){
  if(!GAS){ alert('GAS URLを設定してください'); return; }
  setDot('busy', repos.length+'件送信中...');
  try {
    // 一括送信（10件ずつ分割してURL長制限を回避）
    const chunk = 10;
    let added = 0;
    for(let i=0; i<repos.length; i+=chunk){
      const batch = repos.slice(i, i+chunk);
      const r = await gasSmallWrite({action:'add_repos', repos:batch});
      if(r.status==='ok'){
        added += r.added||0;
        batch.forEach(repo => {
          sheetIds.add(String(repo.id));
          // ローカルにも即反映
          if(!sheetRepos.find(x=>String(x.id)===String(repo.id))){
            sheetRepos.push({
              id:repo.id, repo_name:repo.name, description:repo.description||'',
              language:repo.language||'', url:repo.html_url||'', homepage:repo.homepage||'',
              stars:repo.stargazers_count||0, size_kb:repo.size||0,
              days_since_push:repo.daysSincePush||0, score:repo.score||0,
              gem_reason:repo.gemReason||'', group:repo.group||'未分類',
              priority:repo.priority||'mid', status:'idea', memo:repo.memo||''
            });
          }
        });
      }
    }
    sel.clear();
    setDot('ok', added+'件追加 → アイデアストックで確認');
    // アイデアストックタブに自動移動
    tab = 'ideas';
    document.querySelectorAll('.nav').forEach(n=>n.classList.remove('on'));
    const navBtns = document.querySelectorAll('.nav');
    navBtns.forEach(n=>{ if(n.textContent.includes('アイデア')) n.classList.add('on'); });
    render();
  } catch(e) {
    setDot('err', '送信エラー: '+e.message);
    console.error(e);
  }
}

function renderGroups(grouped, po){
  return Object.keys(grouped).map(function(g){
    var items = grouped[g];
    var open  = expG[g] !== false;
    var hic   = items.filter(function(r){ return r.priority==='high'; }).length;
    var ac    = items.filter(function(r){ return r.status==='active'; }).length;
    var hiTag = hic ? '<span class="tag tg-hi">'+hic+' 高</span>' : '';
    var acTag = ac  ? '<span class="tag tg-act">'+ac+' 稼働</span>' : '';
    var body  = open ? '<div class="grpbody">'+items.map(function(r){ return stockCard(r); }).join('')+'</div>' : '';
    var esc   = g.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return '<div class="grpwrap">'
      +'<div class="grphead" onclick="expG[\'' + esc + '\']=!expG[\'' + esc + '\'];render()">'
        +'<div style="display:flex;align-items:center;gap:7px">'
          +'<span style="font-size:.6rem;color:var(--text3)">'+(open?'▼':'▶')+'</span>'
          +'<span class="grpname">'+h(g)+'</span>'
          +'<span style="font-size:.6rem;color:var(--text3)">'+items.length+'件</span>'
        +'</div>'
        +'<div class="grpmeta">'+hiTag+acTag+'</div>'
      +'</div>'
      +body
    +'</div>';
  }).join('');
}

  <input type="text" placeholder="🔍 検索..." value="${h(sSearch)}" oninput="sSearch=this.value;render()">
  <button class="chip${sFilter==='all'?' on':''}" onclick="sFilter='all';render()">すべて</button>
  <button class="chip${sFilter==='high'?' on':''}" onclick="sFilter='high';render()">優先度高</button>
  <button class="chip${sFilter==='active'?' on':''}" onclick="sFilter='active';render()">稼働中</button>
  <button class="chip${sFilter==='idea'?' on':''}" onclick="sFilter='idea';render()">アイデア</button>
</div>
${renderGroups(grouped, po)}
</div>`
    : '<div style="margin-top:1rem;padding:1rem;text-align:center;font-size:.72rem;color:var(--text3)">GitHubタブで発掘してシートに追加するとここに表示されます</div>';

  return `<div class="phdr">
<div><div class="ptitle">アイデアストック</div><div class="psub">手動アイデア + GitHub発掘リポジトリ</div></div>
<div class="btn-row">
  <button class="btn btn-p" onclick="D.ideas.unshift({id:++D.nextId,text:'',src:'self',priority:'high'});scheduleSave();render()">+ 自発</button>
  <button class="btn" onclick="D.ideas.unshift({id:++D.nextId,text:'',src:'client',priority:'high'});scheduleSave();render()">+ 顧客発</button>
</div></div>
${searchBox}
${list.length===0?'<div style="text-align:center;padding:1rem;font-size:.75rem;color:var(--text3)">該当なし</div>':list.map(idea=>ideaCard(idea)).join('')}
${stockSection}`;
}

function stockCard(r){
  const id=r.id,isExp=expR['s_'+id];
  const sm={active:'稼働中',wip:'開発中',idea:'アイデア',done:'完了'};
  const sc={active:'tg-act',wip:'tg-wip',idea:'tg-idea',done:'tg-arch'};
  const pc={high:'tg-hi',mid:'tg-mid',low:'tg-lo2'};
  return`<div class="rcard${isExp?' exp':''}">
<div class="rtop" onclick="expR['s_${id}']=!expR['s_${id}'];render()">
${r.url?`<a href="${r.url}" target="_blank" class="rname" style="text-decoration:none;color:var(--text);cursor:pointer" title="${h(r.url)}" onclick="event.stopPropagation()">${h(r.repo_name||'—')} <span style="font-size:.58rem;color:var(--text3)">↗</span></a>`:`<span class="rname">${h(r.repo_name||'—')}</span>`}
${r.language?`<span class="tag tg-lang">${r.language}</span>`:''}
<span class="tag ${sc[r.status]||'tg-arch'}">${sm[r.status]||r.status}</span>
<span class="tag ${pc[r.priority]||'tg-lo2'}">${r.priority==='high'?'高':r.priority==='mid'?'中':'低'}</span>
</div>
${r.description?`<div class="rdesc">${h(r.description)}</div>`:''}
<div class="rdetail">
<div><div class="dlbl">グループ</div><select onclick="event.stopPropagation()" onchange="updSheet('${id}','group',this.value)">${groups.map(g=>`<option value="${g}"${(r.group||'未分類')===g?' selected':''}>${g}</option>`).join('')}</select></div>
<div><div class="dlbl">ステータス</div><select onclick="event.stopPropagation()" onchange="updSheet('${id}','status',this.value)"><option value="idea"${r.status==='idea'?' selected':''}>アイデア</option><option value="wip"${r.status==='wip'?' selected':''}>開発中</option><option value="active"${r.status==='active'?' selected':''}>稼働中</option><option value="done"${r.status==='done'?' selected':''}>完了</option></select></div>
<div><div class="dlbl">優先度</div><select onclick="event.stopPropagation()" onchange="updSheet('${id}','priority',this.value)"><option value="high"${r.priority==='high'?' selected':''}>高</option><option value="mid"${r.priority==='mid'?' selected':''}>中</option><option value="low"${r.priority==='low'?' selected':''}>低</option></select></div>
<div><div class="dlbl">メモ</div><textarea onclick="event.stopPropagation()" onchange="updSheet('${id}','memo',this.value)">${h(r.memo||'')}</textarea></div>
<div style="grid-column:span 2"><div class="btn-row">${r.url?`<a href="${r.url}" target="_blank" class="btn" onclick="event.stopPropagation()">GitHub →</a>`:''} ${r.homepage?`<a href="${h(r.homepage)}" target="_blank" class="btn" onclick="event.stopPropagation()">公開 →</a>`:''} <button class="btn btn-d" onclick="event.stopPropagation();delSheet('${id}')">削除</button></div></div>
</div></div>`;
}

function rNote(){
  return`<div class="phdr"><div><div class="ptitle">メモ・目標設定</div></div></div>
<div class="card"><div class="ctitle">目標</div><table class="tbl"><tbody>
<tr><td style="color:var(--text2)">目標クライアント数</td><td><input type="number" value="${D.goals.clients}" oninput="D.goals.clients=parseInt(this.value)||25;scheduleSave()" style="text-align:right;width:60px"> 件</td></tr>
<tr><td style="color:var(--text2)">目標MRR</td><td><input type="number" value="${D.goals.mrr}" oninput="D.goals.mrr=parseInt(this.value)||500;scheduleSave()" style="text-align:right;width:60px"> 万円</td></tr>
</tbody></table></div>
<div class="notearea"><textarea oninput="D.note=this.value;scheduleSave()" placeholder="今日の進捗・気づき・次のアクション...">${h(D.note)}</textarea></div>`;
}

// ═══════════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════════
function render(){
  const map={overview:rOverview,pipeline:rPipeline,projects:rProjects,revenue:rRevenue,github:rGitHub,ideas:rIdeas,note:rNote};
  document.getElementById('main').innerHTML=(map[tab]||rOverview)();
}
function go(t,el){
  tab=t;
  document.querySelectorAll('.nav').forEach(n=>n.classList.remove('on'));
  if(el)el.classList.add('on');
  render();
}

// ═══════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════
window.onload=()=>{
  // 旧バージョンキーから移行
  const OLD_KEYS=['hideo_os_v3','hideo_os_v2','hideo_cmd_v2','hideo_progress_v3','hideo_pos_v1'];
  if(!localStorage.getItem(LS)){
    for(const k of OLD_KEYS){
      const old=localStorage.getItem(k);
      if(old){ try{ const p=JSON.parse(old); if(p&&(p.clients||p.pipeline||p.projects)){ localStorage.setItem(LS,old); console.log('移行:',k); break; } }catch(e){} }
    }
  }
  if(GAS){ document.getElementById('gas-url-input').value=GAS; }
  loadGAS();
};
</script>
</body>
</html>
